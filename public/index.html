<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💰 Expense Tracker</h1>
    <nav>
        <button onclick="showSection('home')">Home</button>
        <button onclick="showSection('add')">Add Expense</button>
        <button onclick="showSection('report')">Report</button>
    </nav>
</header>

<!-- HOME -->
<section id="home" class="active">
    <h2>Dashboard</h2>
    <h3>Total Balance: ₹<span id="balance">0</span></h3>
    <div id="list"></div>
</section>

<!-- ADD -->
<section id="add">
    <h2>Add Expense</h2>
    <input id="text" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <button onclick="addTransaction()">Add</button>
</section>

<!-- REPORT -->
<section id="report">
    <h2>Report</h2>
    <p>Total Income: ₹<span id="income">0</span></p>
    <p>Total Expense: ₹<span id="expense">0</span></p>
</section>

<script src="script.js"></script>
</body>
</html>
