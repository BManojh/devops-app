<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>💰 Expense Tracker</h2>

    <div class="balance-box">
        <h3>Balance</h3>
        <h1 id="balance">₹0</h1>
    </div>

    <div class="summary">
        <div class="income">
            <h4>Income</h4>
            <p id="income">₹0</p>
        </div>
        <div class="expense">
            <h4>Expense</h4>
            <p id="expense">₹0</p>
        </div>
    </div>

    <h3>Add Transaction</h3>

    <input type="text" id="text" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount (+income, -expense)">
    <button onclick="addTransaction()">Add</button>

    <h3>History</h3>

    <input type="text" id="search" placeholder="Search..." onkeyup="filterTransactions()">

    <ul id="list"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
