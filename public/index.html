<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 75%;
      padding: 8px;
    }

    button {
      padding: 8px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #eee;
      margin-top: 10px;
      padding: 8px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>To-Do List</h2>

  <input id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let task = input.value;

  if (task === "") return;

  let li = document.createElement("li");
  li.innerHTML = task + " <span class='delete' onclick='removeTask(this)'>X</span>";

  document.getElementById("taskList").appendChild(li);
  input.value = "";
}

function removeTask(el) {
  el.parentElement.remove();
}
</script>

</body>
</html>
